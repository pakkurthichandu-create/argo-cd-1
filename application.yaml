apiVersion: argoproj.io/v1alpha1 
kind: Application
metadata:
  name: argo-cd-application
spec:
  project: default
  
  source:
    repoURL: https://github.com/pakkurthichandu-create/argo-cd-1.git
    targetRevision: Head
    path: dev
  
  destination:
    server: https://kubernetes.default.svc
    namespace: new-namespace

  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace: true
    